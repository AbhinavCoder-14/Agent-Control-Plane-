<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACP Test App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 2rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        header h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d4ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        header p {
            color: #888;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-card .value {
            font-size: 2rem;
            font-weight: bold;
            color: #00d4ff;
        }

        .stat-card .label {
            color: #888;
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }

        .add-task {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .add-task input {
            flex: 1;
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 1rem;
        }

        .add-task input::placeholder {
            color: #666;
        }

        .add-task button {
            padding: 1rem 2rem;
            border-radius: 8px;
            border: none;
            background: linear-gradient(90deg, #00d4ff, #7b2ff7);
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .add-task button:hover {
            transform: scale(1.05);
        }

        .task-list {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        .task-item {
            display: flex;
            align-items: center;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: background 0.2s;
        }

        .task-item:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .task-item:last-child {
            border-bottom: none;
        }

        .task-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-right: 1rem;
            cursor: pointer;
        }

        .task-item .title {
            flex: 1;
        }

        .task-item.completed .title {
            text-decoration: line-through;
            color: #666;
        }

        .task-item .delete {
            background: none;
            border: none;
            color: #ff4757;
            cursor: pointer;
            font-size: 1.2rem;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .task-item:hover .delete {
            opacity: 1;
        }

        .status {
            text-align: center;
            margin-top: 2rem;
            color: #666;
            font-size: 0.9rem;
        }

        .status.connected {
            color: #2ed573;
        }

        .status.error {
            color: #ff4757;
        }

        .empty {
            text-align: center;
            padding: 3rem;
            color: #666;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>ACP Task Manager</h1>
            <p>Test application for Agent Control Plane tracing</p>
        </header>

        <div class="stats">
            <div class="stat-card">
                <div class="value" id="stat-total">0</div>
                <div class="label">Total Tasks</div>
            </div>
            <div class="stat-card">
                <div class="value" id="stat-completed">0</div>
                <div class="label">Completed</div>
            </div>
            <div class="stat-card">
                <div class="value" id="stat-pending">0</div>
                <div class="label">Pending</div>
            </div>
            <div class="stat-card">
                <div class="value" id="stat-rate">0%</div>
                <div class="label">Completion</div>
            </div>
        </div>

        <div class="add-task">
            <input type="text" id="task-input" placeholder="What needs to be done?">
            <button onclick="addTask()">Add Task</button>
        </div>

        <div class="task-list" id="task-list">
            <div class="empty">Loading tasks...</div>
        </div>

        <div class="status" id="status">Connecting to backend...</div>
    </div>

    <script src="app.js"></script>
</body>

</html>
